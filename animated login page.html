<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Animated Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            width: 600px;
            height: 250px; 
        }

        /* ফর্মের ভেতরে হালকা কালার টিন্ট */
        .form-container { 
            position: absolute; top: 0; height: 100%; width: 50%; 
            transition: all 0.6s ease-in-out; 
            background: linear-gradient(135deg, #ffffff, #f0f7f7);
        }

        .sign-in { left: 0; z-index: 2; }
        .container.active .sign-in { transform: translateX(100%); }
        .sign-up { left: 0; opacity: 0; z-index: 1; }
        .container.active .sign-up { transform: translateX(100%); opacity: 1; z-index: 5; }

        form {
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; padding: 0 25px; height: 100%;
        }

        h1 { font-size: 16px; margin-bottom: 10px; color: #333; }
        input { 
            background-color: #fff; border: 1px solid #d1d8e0; 
            margin: 5px 0; padding: 8px 15px; font-size: 11px; 
            border-radius: 10px; width: 100%; outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: #17a2b8; }

        /* বাটনের প্রিমিয়াম ডিজাইন */
        button {
            background: linear-gradient(to right, #17a2b8, #1abc9c);
            color: #fff; font-size: 10px; padding: 8px 30px;
            border-radius: 20px; border: none; cursor: pointer;
            margin-top: 10px; font-weight: 600;
            box-shadow: 0 4px 10px rgba(23, 162, 184, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { box-shadow: 0 6px 15px rgba(23, 162, 184, 0.5); }
        .hidden { background: transparent; border: 2px solid #fff; padding: 8px 30px; }

        /* এনিমেশনসহ কালার পরিবর্তন */
        .toggle-container {
            position: absolute; top: 0; left: 50%; width: 50%; height: 100%;
            overflow: hidden; transition: all 0.6s ease-in-out;
            border-radius: 0 15px 15px 0; z-index: 1000;
            border: 2px solid #fff;
        }
        .container.active .toggle-container { 
            transform: translateX(-100%); 
            border-radius: 15px 0 0 15px; 
        }

        .toggle {
            height: 100%; color: #fff; position: relative; left: -100%; width: 200%;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(90deg, #3498db, #1abc9c); /* Default: Blue/Green */
        }
        .container.active .toggle { 
            transform: translateX(50%); 
            background: linear-gradient(90deg, #f39c12, #e74c3c); /* Switch to: Orange/Red */
        }

        .toggle-panel { 
            position: absolute; width: 50%; height: 100%; display: flex; 
            align-items: center; justify-content: center; flex-direction: column; 
            padding: 0 20px; text-align: center; transition: all 0.6s ease-in-out; 
        }
        .toggle-left { transform: translateX(-200%); }
        .container.active .toggle-left { transform: translateX(0); }
        .toggle-right { right: 0; transform: translateX(0); }
        .container.active .toggle-right { transform: translateX(200%); }
        
        .forgot { font-size: 9px; margin: 6px 0; color: #777; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="form-container sign-up">
            <form>
                <h1>Create Account</h1>
                <input type="text" placeholder="Name">
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <button type="button">SIGN UP</button>
            </form>
        </div>

        <div class="form-container sign-in">
            <form>
                <h1>Sign In</h1>
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <a href="#" class="forgot">Forget Password?</a>
                <button type="button">SIGN IN</button>
            </form>
        </div>

        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Welcome Back!</h1>
                    <button class="hidden" id="login">SIGN IN</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>Hello, Friend!</h1>
                    <button class="hidden" id="register">SIGN UP</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        document.getElementById('register').addEventListener('click', () => container.classList.add("active"));
        document.getElementById('login').addEventListener('click', () => container.classList.remove("active"));
    </script>
</body>
</html>
