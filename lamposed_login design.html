<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 3D Cute Lamp Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        :root {
            --lamp-off: #2c3e50;
            --lamp-on: #91ff91;
            --accent-green: #00e676;
            --text-color: #ffffff;
            --bg-gradient: linear-gradient(180deg, #10847e 0%, #474a75 50%, #7a0058 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050505;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* থামনেইল কার্ড (১৬:৯ অনুপাত এবং ভেতর থেকে সব কিছু ছোট রাখা হয়েছে) */
        .card-container {
            position: relative;
            width: 850px;
            aspect-ratio: 16 / 9;
            background: var(--bg-gradient);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            perspective: 1200px;
        }

        /* বাম পাশে ল্যাম্পপোস্ট */
        .lamp-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .lamp-svg {
            width: 60%; /* ল্যাম্পপোস্ট ছোট করা হয়েছে */
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
        }

        .lamp-shade { fill: var(--lamp-off); transition: fill 0.3s; }

        /* আলোর আভা (Beam) */
        .light-beam {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -20%);
            width: 200px;
            height: 250px;
            background: radial-gradient(ellipse at top, rgba(145, 255, 145, 0.25), transparent 75%);
            clip-path: polygon(40% 0%, 60% 0%, 100% 100%, 0% 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        /* বাতাসে দুলন্ত দড়ি */
        .cord-group {
            cursor: pointer;
            transform-origin: 155px 160px;
            animation: cordSway 4s ease-in-out infinite;
        }

        @keyframes cordSway {
            0%, 100% { transform: rotate(-1.5deg); }
            50% { transform: rotate(1.5deg); }
        }

        @keyframes pull {
            0% { transform: scaleY(1); }
            50% { transform: scaleY(1.4) translateY(10px); }
            100% { transform: scaleY(1); }
        }
        .is-pulling { animation: pull 0.3s ease-out !important; }

        /* --- প্রমিয়াম স্লিম লগইন ডায়ালগ --- */
        .login-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 290px; /* সাইজ অনেক কমানো হয়েছে যাতে ফিট হয় */
            padding: 30px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            color: white;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.6) translateY(40px) rotateY(-10deg);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .login-box.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1) translateY(0) rotateY(0deg);
            box-shadow: -20px 0 50px rgba(0, 230, 118, 0.1), 0 15px 35px rgba(0,0,0,0.4);
            border-color: var(--accent-green);
        }

        .login-box h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .input-wrap {
            margin-bottom: 18px;
            position: relative;
        }

        .input-wrap label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: #bdc3c7;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .input-wrap input {
            width: 100%;
            padding: 11px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            outline: none;
            font-size: 13px;
            transition: 0.3s;
        }

        .input-wrap input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--accent-green);
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent-green);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 8px 20px rgba(0, 230, 118, 0.3);
        }

        /* লাইট অন মুড */
        .is-on .lamp-shade { fill: var(--lamp-on); }
        .is-on .light-beam { opacity: 1; }
        .is-on .eye-closed { display: none; }
        .is-on .eye-open, .is-on .mouth-happy, .is-on .tongue { display: block; }
        .is-on .tongue { fill: #ff4757; }

        @media (max-width: 900px) {
            .card-container { width: 95%; padding: 20px; }
            .login-box { width: 240px; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="card-container" id="card">
        
        <!-- ল্যাম্প সেকশন -->
        <div class="lamp-section">
            <div class="light-beam"></div>
            <svg class="lamp-svg" viewBox="0 0 200 350">
                <!-- রিয়ালিস্টিক থ্রিডি স্ট্যান্ড -->
                <rect x="96" y="160" width="8" height="150" fill="#1e272e" rx="4" />
                <ellipse cx="100" cy="310" rx="50" ry="10" fill="#1e272e" />
                
                <!-- চওড়া প্রমিয়াম শেড -->
                <path class="lamp-shade" d="M30,160 L170,160 L155,40 C155,25 140,15 100,15 C60,15 45,25 45,40 Z" />

                <!-- কিউট ফেস -->
                <g transform="translate(0, 10)">
                    <path class="eye-closed" d="M78,85 Q83,90 88,85" stroke="#111" fill="none" stroke-width="3"/>
                    <path class="eye-closed" d="M112,85 Q117,90 122,85" stroke="#111" fill="none" stroke-width="3"/>
                    <circle class="eye-open" cx="83" cy="85" r="5" fill="#000" />
                    <circle class="eye-open" cx="117" cy="85" r="5" fill="#000" />
                    <path class="mouth-happy" d="M82,100 Q100,125 118,100 L82,100 Z" fill="#111" />
                    <circle class="tongue" cx="103" cy="115" r="4" />
                </g>

                <!-- সুইচ (Cord) - ক্লিক করা সহজ করার জন্য বড় এরিয়া -->
                <g class="cord-group" id="pullCord">
                    <rect x="140" y="160" width="30" height="90" fill="transparent" />
                    <path d="M155,160 Q158,195 155,240" stroke="#333" stroke-width="3" fill="none" />
                    <circle cx="155" cy="245" r="7" fill="#444" />
                </g>
            </svg>
        </div>

        <!-- প্রিমিয়াম লগইন সেকশন -->
        <div class="login-section">
            <div class="login-box" id="loginBox">
                <h2>Welcome Back</h2>
                <div class="input-wrap">
                    <label>Username</label>
                    <input type="text" placeholder="Your account name">
                </div>
                <div class="input-wrap">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password">
                </div>
                <button class="login-btn">Log In Now</button>
            </div>
        </div>

    </div>

    <script>
        const cord = document.getElementById('pullCord');
        const card = document.getElementById('card');
        const loginBox = document.getElementById('loginBox');

        let lightStatus = false;

        cord.addEventListener('click', () => {
            // ১. দড়ি টানার এনিমেশন
            cord.classList.add('is-pulling');
            setTimeout(() => cord.classList.remove('is-pulling'), 300);

            // ২. লাইট ও বক্স কন্ট্রোল
            lightStatus = !lightStatus;
            if(lightStatus) {
                card.classList.add('is-on');
                loginBox.classList.add('active');
            } else {
                card.classList.remove('is-on');
                loginBox.classList.remove('active');
            }
        });
    </script>
</body>
</html>
