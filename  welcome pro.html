<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morad Hasan - Premium Join Portal</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Inter & Space Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #020617;
    }
    
    .font-display {
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Premium Dynamic Border Glow */
    .custom-card {
      background: linear-gradient(145deg, #020813 0%, #061021 100%);
      border: 1px solid rgba(6, 182, 212, 0.35);
      animation: pulse-card 3s ease-in-out infinite;
      backdrop-filter: blur(16px);
    }

    @keyframes pulse-card {
      0%, 100% {
        box-shadow: 0 0 25px rgba(6, 182, 212, 0.15), inset 0 0 15px rgba(6, 182, 212, 0.05);
        border-color: rgba(6, 182, 212, 0.3);
      }
      50% {
        box-shadow: 0 0 50px rgba(6, 182, 212, 0.35), inset 0 0 25px rgba(6, 182, 212, 0.15);
        border-color: rgba(6, 182, 212, 0.85);
      }
    }

    /* Rotating Tracking Ring Animations */
    .glowing-ring-outer {
      animation: slow-spin 12s linear infinite;
    }

    .glowing-ring-inner {
      animation: slow-spin-reverse 15.6s linear infinite;
    }

    @keyframes slow-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes slow-spin-reverse {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }

    /* Heartbeat Breath Button Animation */
    @keyframes rhythmic-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.025); }
    }
    .animate-btn-pulse {
      animation: rhythmic-pulse 3.5s ease-in-out infinite;
    }

    /* Button Shimmer Ray */
    .shimmer-btn {
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(6, 182, 212, 0.25), inset 0 1.5px 1px rgba(255, 255, 255, 0.35);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .shimmer-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transform: translateX(-150%) skewX(-15deg);
      animation: shimmer-slide 3.5s infinite ease-in-out;
    }

    @keyframes shimmer-slide {
      0%, 75% { transform: translateX(-150%) skewX(-15deg); }
      85%, 100% { transform: translateX(150%) skewX(-15deg); }
    }

    .shimmer-btn:hover {
      transform: translateY(-3px) scale(1.015);
      box-shadow: 0 12px 40px rgba(6, 182, 212, 0.45), inset 0 1.5px 1.5px rgba(255, 255, 255, 0.45);
    }

    .shimmer-btn:active {
      transform: translateY(1px) scale(0.99);
    }

    /* Ambient floaters for background */
    @keyframes float-p {
      0% { transform: translateY(110vh) translateX(0) scale(1); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-10vh) translateX(60px) scale(0.3); opacity: 0; }
    }

    .sparkle {
      position: absolute;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden relative selection:bg-cyan-500 selection:text-slate-900">

  <!-- Aesthetic Background Flows -->
  <div class="absolute top-1/6 left-1/5 w-[500px] h-[500px] bg-cyan-950/15 rounded-full blur-[140px] pointer-events-none"></div>
  <div class="absolute bottom-1/6 right-1/5 w-[500px] h-[500px] bg-blue-900/10 rounded-full blur-[140px] pointer-events-none"></div>

  <!-- Background Sparks -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none" id="particles-container">
    <div class="sparkle w-4 h-4" style="left: 12%; top: 40%; animation: float-p 14s linear infinite;"></div>
    <div class="sparkle w-2 h-2" style="left: 48%; top: 65%; animation: float-p 9s linear infinite; animation-delay: 1.5s;"></div>
    <div class="sparkle w-3 h-3" style="left: 77%; top: 25%; animation: float-p 16s linear infinite; animation-delay: 3s;"></div>
    <div class="sparkle w-2 h-2" style="left: 88%; top: 80%; animation: float-p 11s linear infinite; animation-delay: 0.8s;"></div>
  </div>

  <!-- COMPACT PREMIUM DIALOG CARD -->
  <div class="custom-card w-full rounded-[24px] px-7 py-7 md:px-9 md:py-8 flex flex-col items-center relative z-10 transition-all hover:scale-[1.005] duration-300" 
       style="max-width: 420px;">
    
    <!-- Optimized Elegant Floating Ring Avatar Container (More compact spacer) -->
    <div class="relative w-32 h-32 flex items-center justify-center mb-5">
      <!-- Outer revolving tracker -->
      <div class="glowing-ring-outer absolute inset-0 rounded-full border-2 border-dashed border-cyan-400/25 shadow-[0_0_15px_rgba(6,182,212,0.12)]"></div>
      
      <!-- Inner tracking light -->
      <div class="glowing-ring-inner absolute inset-1.5 rounded-full border border-cyan-400/50 shadow-[0_0_12px_rgba(6,182,212,0.25),inset_0_0_8px_rgba(6,182,212,0.15)]"></div>
      
      <!-- Profile avatar image wrapper -->
      <div class="relative w-24 h-24 rounded-full p-0.5 bg-gradient-to-tr from-cyan-400 to-blue-500 shadow-lg overflow-hidden flex items-center justify-center z-10">
        <img class="w-full h-full object-cover rounded-full select-none" 
             src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=400&h=400&q=80" 
             alt="Morad Hasan"
             referrerpolicy="no-referrer">
      </div>
    </div>

    <!-- User Identity & Badge -->
    <div class="flex items-center justify-center mb-4 gap-1.5">
      <h2 class="font-display text-xl md:text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-400 to-cyan-400">
        Morad Hasan
      </h2>
      
      <span class="inline-flex items-center justify-center text-cyan-400 fill-cyan-400 scale-95 md:scale-100">
        <!-- Blue Verified Octagon Star Badge -->
        <svg class="w-5.5 h-5.5 drop-shadow-[0_0_8px_rgba(6,182,212,0.6)]" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2c.4 0 .9.3 1.1.7l1 1.6c.2.3.6.5 1 .6l1.8.3c.5.1.9.5 1 1l.3 1.8c0 .4.2.8.5 1l1.7.9c.4.3.6.8.5 1.4l-.5 1.8c-.1.4 0 .8.2 1.2l1.2 1.4c.3.4.3 1 0 1.4l-1.2 1.4c-.2.4-.3.8-.2 1.2l.5 1.8c.1.5-.1 1.1-.5 1.4l-1.7.9c-.3.2-.5.6-.5 1l-.3 1.8c-.1.5-.5.9-1 1l-1.8.3c-.4.1-.8.2-1 .5l-1 1.7c-.3.4-.8.6-1.4.5l-1.8-.5c-.4-.1-.8 0-1.2.2L10 22.8c-.4.3-1 .3-1.4 0l-1.4-1.2c-.4-.2-.8-.3-1.2-.2l-1.8.5c-.5.1-1.1-.1-1.4-.5l-.9-1.7c-.2-.3-.6-.5-1-.5l-1.8-.3c-.5-.1-.9-.5-1-1l-.3-1.8c0-.4-.2-.8-.5-1l-1.7-.9c-.4-.3-.6-.8-.5-1.4l.5-1.8c.1-.4 0-.8-.2-1.2L1.2 12.7c-.3-.4-.3-1 0-1.4l1.2-1.4c.2-.4.3-.8.2-1.2L2.1 6.9c-.1-.5.1-1.1.5-1.4l1.7-.9c.3-.2.5-.6.5-1l.3-1.8c.1-.5.5-.9 1-1l1.8-.3c.4-.1.8-.2 1-.5l1-1.7C11.1 2.3 11.6 2.1 12 2zm-1.8 13.6l6-6L14.8 8.2l-4.6 4.6-2.2-2.2L6.6 12l3.6 3.6z" />
        </svg>
      </span>
    </div>

    <!-- Bengali Info Paragraph with Pink and Cyan highlight colors -->
    <p class="text-[15px] md:text-[16px] leading-relaxed text-center text-slate-200/90 font-medium tracking-wide mb-4 max-w-[95%]">
      🚀 এই প্রিমিয়াম অ্যাপসটি ব্যবহার করতে হলে প্রথমে <span class="text-pink-500 font-extrabold shadow-[0_0_12px_rgba(236,72,153,0.3)]">Join</span> <span class="text-cyan-400 font-extrabold shadow-[0_0_12px_rgba(6,182,212,0.3)]">Telegram</span> বাটনে ক্লিক করে আমাদের অফিসিয়াল চ্যানেলে জয়েন হতে হবে।
    </p>

    <!-- Pulsing Diamond Accent -->
    <div class="mb-4 flex justify-center items-center drop-shadow-[0_0_12px_rgba(6,182,212,0.8)]">
      <span class="text-lg animate-bounce duration-1000">💎</span>
    </div>

    <!-- English Subtext -->
    <p class="text-[13px] md:text-[14px] leading-relaxed text-center text-slate-400 font-normal tracking-wide mb-5 max-w-[88%]">
      To use these premium apps, you must first join the channel by clicking the Join Telegram Button.
    </p>

    <!-- Thicker, Breathing Premium CTA Button -->
    <a href="https://t.me/yourchannel" 
       target="_blank" 
       rel="noopener noreferrer" 
       class="shimmer-btn animate-btn-pulse w-full py-5 md:py-[22px] rounded-[20px] bg-gradient-to-b from-blue-500 to-blue-700 text-white font-extrabold uppercase tracking-widest text-center text-sm md:text-[15px] select-none active:scale-[0.98] block">
      Join Telegram
    </a>

  </div>

  <script>
    // Premium Subtle Particle Generator for floating stars
    const container = document.getElementById('particles-container');
    const colors = ['rgba(6, 182, 212, 0.25)', 'rgba(56, 189, 248, 0.15)', 'rgba(236, 72, 153, 0.12)'];

    function createParticle() {
      if(!container) return;
      const p = document.createElement('div');
      p.className = 'sparkle';
      
      const size = Math.random() * 6 + 2;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      
      p.style.left = Math.random() * 100 + '%';
      p.style.top = '100%';
      
      const delay = Math.random() * 4;
      p.style.animationDelay = delay + 's';
      
      const duration = Math.random() * 7 + 5;
      p.style.animation = 'float-p ' + duration + 's linear infinite';
      
      const color = colors[Math.floor(Math.random() * colors.length)];
      p.style.background = `radial-gradient(circle, ${color} 0%, transparent 70%)`;
      
      container.appendChild(p);

      setTimeout(() => {
        p.remove();
      }, (duration + delay) * 1000);
    }

    // Spawn initial particles
    for (let i = 0; i < 10; i++) {
      setTimeout(createParticle, i * 500);
    }

    // Continuously generate new subtle sparkles
    setInterval(createParticle, 1550);
  </script>

</body>
</html>
