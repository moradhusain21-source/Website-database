<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Day #53 - Url Shortner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; outline: none; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: hsla(0, 100%, 50%, 1); background-image: radial-gradient(at 40% 20%, hsla(28, 100%, 74%, 1) 0px, transparent 50%), radial-gradient(at 80% 0%, hsla(189, 100%, 56%, 1) 0px, transparent 50%), radial-gradient(at 0% 50%, hsla(355, 100%, 93%, 1) 0px, transparent 50%), radial-gradient(at 80% 50%, hsla(340, 100%, 76%, 1) 0px, transparent 50%), radial-gradient(at 0% 100%, hsla(22, 100%, 77%, 1) 0px, transparent 50%), radial-gradient(at 80% 100%, hsla(242, 100%, 70%, 1) 0px, transparent 50%), radial-gradient(at 0% 0%, hsla(343, 100%, 76%, 1) 0px, transparent 50%); }
        .container { background: rgba(255, 255, 255, 0.24); border-radius: 10px; padding: 20px 30px; border: 2px solid #000; text-align: center; min-width: 400px; backdrop-filter: blur(2px); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .container i { font-size: 100px; margin-bottom: 10px; }
        h1 { font-size: 28px; margin-bottom: 20px; color: #333; }
        label { text-align: left; font-size: 15px; font-weight: 500; margin: 10px 0; display: block; }
        input, textarea { width: 100%; padding: 8px; margin-bottom: 15px; border: 2px solid #000; border-radius: 5px; font-size: 14px; color: #000; background-color: transparent; font-weight: 500; }
        input::placeholder { color: #222; }
        .buttons { display: flex; gap: 10px; }
        button { width: 100%; color: #000; border: 2px solid #000; border-radius: 5px; padding: 8px; font-weight: 500; background-color: transparent; cursor: pointer; transition: all 0.3s ease; }
        button:hover { background-color: #000; color: #fff; }
        textarea { resize: none; }
    </style>
</head>
<body>

    <div class="container">
        <i class="bx bx-link-alt"></i>
        <h1>Url Shortner</h1>
        <label for="originalUrl">Enter URL To Shorten :</label>
        <input type="text" id="originalUrl" placeholder="https://example.com">
        <div class="buttons">
            <button id="reload-btn">Reload</button>
            <button id="short-btn">Short It</button>
        </div>
        <label for="shortenedUrl">Shortened URL :</label>
        <textarea id="shortenedUrl" rows="3" readonly></textarea>
    </div>

    <script>
        const shortBtn = document.getElementById('short-btn');
        const reloadBtn = document.getElementById('reload-btn');

        shortBtn.addEventListener('click', () => {
            var originalUrl = document.getElementById("originalUrl").value;
            if(!originalUrl) {
                alert("Please enter a valid URL!");
                return;
            }
            var apiUrl = "https://tinyurl.com/api-create.php?url=" + encodeURIComponent(originalUrl);
            var shortenedUrlTextarea = document.getElementById("shortenedUrl");

            fetch(apiUrl)
                .then(response => response.text())
                .then(data => {
                    shortenedUrlTextarea.value = data;
                })
                .catch(error => {
                    shortenedUrlTextarea.value = "Error : Unable to shorten URL!";
                });
        });

        reloadBtn.addEventListener('click', () => {
            location.reload();
        });
    </script>
</body>
</html>
